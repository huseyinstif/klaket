name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - run: go mod tidy && go vet ./... && go test ./... && go build ./...

  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m compileall klaket_worker
      - run: pip install pytest redis && python -m pytest tests -q

  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/dashboard } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install && npm run build

  mcp:
    name: MCP server (TS)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/mcp } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install && npm run build
