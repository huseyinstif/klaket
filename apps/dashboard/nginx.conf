server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the klaket-api service (strips the /api prefix)
    location /api/ {
        proxy_pass http://api:8484/;
        proxy_set_header Host $host;
    }
}
